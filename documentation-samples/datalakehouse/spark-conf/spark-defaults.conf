spark.sql.catalogImplementation=hive
spark.sql.hive.thriftServer.singleSession=false

# hadoop-aws (+ its transitive AWS SDK) provides the s3a:// filesystem and is NOT
# bundled in the official apache/spark image; the version must match the bundled
# Hadoop client (3.3.4 in apache/spark:3.5.3). The Hudi bundle is resolved here too.
spark.jars.packages=org.apache.hudi:hudi-spark3.5-bundle_2.12:0.15.0,org.apache.hadoop:hadoop-aws:3.3.4
# The official apache/spark image runs as user `spark` whose $HOME (/home/spark)
# does not exist, so Ivy cannot create its default ~/.ivy2 cache when resolving
# spark.jars.packages. Point Ivy at a writable location.
spark.jars.ivy=/tmp/.ivy2

# Hudi requires the Kryo serializer.
spark.serializer=org.apache.spark.serializer.KryoSerializer

# NOTE: spark.sql.extensions / spark.sql.catalog.spark_catalog (HoodieCatalog) are
# only needed for Hudi *Spark SQL*. The Hudi step of this demo writes via the
# DataFrame API (spark-shell), which does not need them, and configuring a custom
# catalog while resolving Hudi through spark.jars.packages fails in spark-shell
# (the catalog plugin class is not visible to the REPL classloader). The Iceberg
# and Delta Lake steps set their own spark_catalog on the spark-sql command line.
#spark.sql.extensions=org.apache.spark.sql.hudi.HoodieSparkSessionExtension
#spark.sql.catalog.spark_catalog=org.apache.spark.sql.hudi.catalog.HoodieCatalog

spark.hive.metastore.uris=thrift://hive-metastore:9083
spark.hive.metastore.schema.verification=false

spark.hadoop.fs.s3.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.endpoint=http://minio:9000
spark.hadoop.fs.s3a.path.style.access=true
spark.hadoop.fs.s3a.access.key=admin
spark.hadoop.fs.s3a.secret.key=password

spark.ui.port=4041
