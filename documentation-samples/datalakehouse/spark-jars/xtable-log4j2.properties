# Log4j2 config for the Apache XTable RunSync step (see README step 5).
# XTable's bundled jar logs via Log4j2 at INFO, which floods the console with
# Hudi/Spark/Iceberg/Hadoop output. This quiets the root logger to ERROR while
# keeping org.apache.xtable at INFO so the per-table progress and the
# "Sync is successful ..." confirmation still print. Pass it with:
#   java -Dlog4j2.configurationFile=/opt/spark/auxjars/xtable-log4j2.properties ...
status = error

appender.console.type = Console
appender.console.name = console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} %-5p %c - %m%n

rootLogger.level = error
rootLogger.appenderRef.stdout.ref = console

# Keep XTable's own logs (incl. "Sync is successful ...") visible
logger.xtable.name = org.apache.xtable
logger.xtable.level = info
