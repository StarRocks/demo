spark.sql.catalogImplementation=hive
spark.sql.hive.thriftServer.singleSession=false

# The official apache/spark image runs as user `spark` whose $HOME (/home/spark)
# does not exist, so Ivy cannot create its default ~/.ivy2 cache when resolving
# the Delta + hadoop-aws packages passed via spark-sql --packages. Point Ivy at a
# writable location.
spark.jars.ivy=/tmp/.ivy2

spark.hive.metastore.uris=thrift://hive-metastore:9083
spark.hive.metastore.schema.verification=false

spark.hadoop.fs.s3.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3n.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.endpoint=http://minio:9000
spark.hadoop.fs.s3a.path.style.access=true
spark.hadoop.fs.s3a.access.key=admin
spark.hadoop.fs.s3a.secret.key=password

spark.ui.port=4041
